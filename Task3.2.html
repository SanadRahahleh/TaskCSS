<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link rel="stylesheet" href="stayle3.2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-background">
        <div class="login-card">
            
            <div class="image-section">
                <div class="circle-bg">
                    <img src="https://img.icons8.com/clouds/200/laptop.png" alt="Laptop Icon">
                </div>
            </div>

            <div class="form-section">
                <h2>Member Login</h2>
                
                <form>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="******">
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>
                </form>

                <div class="help-links">
                    <p>Forgot <span>Username / Password ?</span></p>
                    <a href="#" class="create-acc">Create your account <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
